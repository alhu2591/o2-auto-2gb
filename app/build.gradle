plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

android {
    namespace 'com.o2.auto2gb'
    compileSdk 36  // Android 16

    defaultConfig {
        applicationId "com.o2.auto2gb"
        minSdk 26          // Android 8.0 Oreo — أدنى إصدار يدعم WorkManager + foreground
        targetSdk 36       // Android 16 — توافق كامل
        versionCode 4
        versionName "2.0"

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    buildTypes {
        debug {
            debuggable true
        }
        release {
            minifyEnabled true   // تصغير الكود في الإصدار النهائي
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    kotlinOptions {
        jvmTarget = '17'
    }
}

dependencies {
    // لا نستخدم appcompat لأن SetupActivity تمتد من Activity مباشرة
    implementation 'androidx.core:core-ktx:1.13.1'
    implementation 'androidx.work:work-runtime-ktx:2.9.1'

    testImplementation 'junit:junit:4.13.2'
}
