name: Android CI

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Install Android SDK platform 35
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "Available SDKs:"
          ls $ANDROID_HOME/platforms/ 2>/dev/null || echo "none"
          sdkmanager --install "platforms;android-35" "build-tools;35.0.0" 2>&1 | tail -5
          echo "After install:"
          ls $ANDROID_HOME/platforms/

      - name: Build Debug APK
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
        run: gradle assembleDebug --stacktrace 2>&1

      - name: Show all outputs
        if: always()
        run: find . -name "*.apk" -o -name "*.log" 2>/dev/null | head -20

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: O2-Auto-2GB
          path: app/build/outputs/apk/debug/app-debug.apk
