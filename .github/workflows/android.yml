name: Android CI

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Gradle wrapper jar
        run: |
          mkdir -p gradle/wrapper
          curl -sL https://services.gradle.org/distributions/gradle-8.9-bin.zip -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/gradle-dist
          cp /tmp/gradle-dist/gradle-8.9/lib/plugins/gradle-wrapper-*.jar gradle/wrapper/gradle-wrapper.jar || \
          find /tmp/gradle-dist -name "gradle-wrapper.jar" -exec cp {} gradle/wrapper/gradle-wrapper.jar \;
          ls -lh gradle/wrapper/

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --info

      - name: Show generated files
        run: find app/build/outputs -type f 2>/dev/null || echo "No outputs found"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: O2-Auto-2GB
          path: app/build/outputs/apk/debug/app-debug.apk
