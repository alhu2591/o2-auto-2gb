name: Android CI

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35 build-tools;35.0.0'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Debug environment
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          ls $ANDROID_HOME/platforms/ || echo "no platforms"
          ls $ANDROID_HOME/build-tools/ || echo "no build-tools"
          java -version

      - name: Build Debug APK
        run: |
          export ANDROID_HOME=$ANDROID_HOME
          export ANDROID_SDK_ROOT=$ANDROID_HOME
          gradle assembleDebug --stacktrace --info 2>&1 | grep -E "ERROR|error:|FAILED|Caused|Exception|warning:|at com.android|SDK" | head -40

      - name: Full build log on failure
        if: failure()
        run: gradle assembleDebug 2>&1 | tail -80

      - name: Show APK
        if: always()
        run: find . -name "*.apk" 2>/dev/null || echo "No APK"

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: O2-Auto-2GB
          path: app/build/outputs/apk/debug/app-debug.apk
