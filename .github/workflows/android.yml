name: Android CI

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35 build-tools;35.0.0'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Build Debug APK
        run: gradle assembleDebug --stacktrace 2>&1 | tee /tmp/build.log; exit ${PIPESTATUS[0]}

      - name: Build Release APK (unsigned)
        run: gradle assembleRelease --stacktrace 2>&1 | tee -a /tmp/build.log; exit ${PIPESTATUS[0]}

      - name: Print error if failed
        if: failure()
        run: |
          echo "=== FIRST 60 LINES ==="
          head -60 /tmp/build.log
          echo "=== LAST 80 LINES ==="
          tail -80 /tmp/build.log

      - name: Show APK sizes
        if: success()
        run: |
          echo "=== Built APKs ==="
          find . -name "*.apk" -exec ls -lh {} \;

      - name: Upload Debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: O2-Auto-2GB-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Release APK (unsigned)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: O2-Auto-2GB-release
          path: app/build/outputs/apk/release/app-release-unsigned.apk
